name: build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          # Single-config generators (Make/Ninja) emit build/; MSVC emits
          # build/Release/. Rename per-OS so release assets don't collide.
          if   [ -f build/hurra-bridge ]; then
            cp build/hurra-bridge "dist/hurra-bridge-${{ matrix.os }}"
          elif [ -f build/Release/hurra-bridge.exe ]; then
            cp build/Release/hurra-bridge.exe "dist/hurra-bridge-${{ matrix.os }}.exe"
          elif [ -f build/hurra-bridge.exe ]; then
            cp build/hurra-bridge.exe "dist/hurra-bridge-${{ matrix.os }}.exe"
          else
            echo "no hurra-bridge binary found" >&2
            exit 1
          fi

      - name: Upload hurra-bridge binary
        uses: actions/upload-artifact@v4
        with:
          name: hurra-bridge-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to create the GitHub Release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

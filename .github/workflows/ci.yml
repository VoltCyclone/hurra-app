name: build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          # Tagged builds get a versioned name (e.g. hurra-bridge-v1.2.0-linux-x64);
          # untagged CI builds fall back to the bare platform name.
          ref="${{ github.ref }}"
          ver=""
          case "$ref" in refs/tags/*) ver="-${ref#refs/tags/}";; esac
          base="hurra-bridge${ver}-${{ matrix.platform }}"
          # Single-config generators (Make/Ninja) emit build/; MSVC emits build/Release/.
          if   [ -f build/hurra-bridge ]; then
            cp build/hurra-bridge "dist/${base}"
          elif [ -f build/Release/hurra-bridge.exe ]; then
            cp build/Release/hurra-bridge.exe "dist/${base}.exe"
          elif [ -f build/hurra-bridge.exe ]; then
            cp build/hurra-bridge.exe "dist/${base}.exe"
          else
            echo "no hurra-bridge binary found" >&2
            exit 1
          fi

      - name: Upload hurra-bridge binary
        uses: actions/upload-artifact@v4
        with:
          name: hurra-bridge-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to create the GitHub Release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
